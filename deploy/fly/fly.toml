# fly.io app config for Ploidy.
#
# Rename `ploidy-demo` before `flyctl deploy`. Static admission tokens and
# API credentials go via `flyctl secrets set`, not this file.

app = "ploidy-demo"
primary_region = "nrt"  # Tokyo; pick the closest fly region to your users

[build]
  image = "ghcr.io/heznpc/ploidy:0.4.0"

[env]
  PLOIDY_TRANSPORT = "streamable-http"
  PLOIDY_PORT = "8765"
  PLOIDY_DB_PATH = "/data/ploidy.db"
  PLOIDY_LOG_LEVEL = "INFO"
  PLOIDY_AUTH_MODE = "bearer"
  PLOIDY_MAX_CONTEXT_DOCS = "10"
  PLOIDY_MAX_CONTEXT_TOKENS = "20000"
  PLOIDY_RATE_CAPACITY = "20"
  PLOIDY_RATE_PER_SEC = "1"
  PLOIDY_RETENTION_DAYS = "30"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[mounts]]
  source = "ploidy_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512
