name: Docs validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"

      - name: Build documentation strictly
        run: uv run --frozen --extra docs mkdocs build --strict

      # Publishing is intentionally release-only. release.yml deploys the
      # exact prebuilt site from the tagged github.sha.
