name: Docs validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.19"

      - name: Build documentation strictly
        run: uv run --frozen --extra docs mkdocs build --strict

      # Publishing is intentionally release-only. release.yml deploys the
      # exact prebuilt site from the tagged github.sha.
