name: Docs validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.19"

      - name: Build documentation strictly
        run: uv run --frozen --extra docs mkdocs build --strict

      # Publishing is intentionally release-only. release.yml deploys the
      # exact prebuilt site from the tagged github.sha.
