name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          curl -sSfL "$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -o 'https://[^"]*linux_x64.tar.gz')" | tar xz -C /tmp
          /tmp/gitleaks detect --source . --verbose --redact

      - name: Check for large files
        run: |
          LARGE=$(find . -not -path './.git/*' -not -path './.venv/*' -type f -size +5M)
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected (>5 MB):"
            echo "$LARGE"
            exit 1
          fi

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e "." pip-licenses

      - name: Check licenses
        run: >
          pip-licenses
          --fail-on="GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later"
          --order=license

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest -v --cov=ploidy --cov-report=term-missing --cov-fail-under=60

  package:
    name: Wheel and docs smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          python-version: "3.13"

      - name: Verify lock and release mirrors
        run: |
          uv lock --check
          python scripts/check_release_consistency.py

      - name: Build documentation strictly
        run: uv run --frozen --extra docs mkdocs build --strict

      - name: Build wheel and source distribution
        run: uv build

      - name: Verify service-only distribution contents
        run: python scripts/check_release_consistency.py --dist-dir dist

      - name: Install wheel in a clean environment
        run: |
          WHEEL=$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -name '*.whl' -print -quit)
          test -n "$WHEEL"
          python -m venv /tmp/ploidy-wheel-smoke
          /tmp/ploidy-wheel-smoke/bin/python -m pip install \
            "${WHEEL}[api,dashboard,metrics,redis,cli]"
          cd /tmp
          EXPECTED_PLOIDY_VERSION="$(python -c \
            'import os,tomllib; p=os.path.join(os.environ["GITHUB_WORKSPACE"],"pyproject.toml"); print(tomllib.load(open(p,"rb"))["project"]["version"])')"
          export EXPECTED_PLOIDY_VERSION
          /tmp/ploidy-wheel-smoke/bin/python \
            "$GITHUB_WORKSPACE/scripts/smoke_installed_package.py"

      - name: Authenticated startup smoke
        run: |
          cd /tmp
          /tmp/ploidy-wheel-smoke/bin/python \
            "$GITHUB_WORKSPACE/scripts/auth_startup_smoke.py"
